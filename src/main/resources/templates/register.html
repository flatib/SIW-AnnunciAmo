<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/base.html :: headerfiles('Registrazione')"></head>
<body>
    <header th:replace="fragments/base.html :: intestazione"></header>

    <div>
        <h2>Registrati</h2>
        <p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red"></p>

        <form th:action="@{/register}" method="POST">
            <div>
                <label for="name">Nome</label>
                <input type="text" id="name" th:field="${user.name}" required />
                <span th:if="${#fields.hasErrors('user.name')}" th:errors="${user.name}" style="color:red"></span>
            </div>
            <div>
                <label for="surname">Cognome</label>
                <input type="text" id="surname" th:field="${user.surname}" required />
                <span th:if="${#fields.hasErrors('user.surname')}" th:errors="${user.surname}" style="color:red"></span>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" th:field="${user.email}" required />
                <span th:if="${#fields.hasErrors('user.email')}" th:errors="${user.email}" style="color:red"></span>
            </div>
            <div>
                <label for="username">Username</label>
                <input type="text" id="username" th:field="${credentials.username}" required />
                <span th:if="${#fields.hasErrors('credentials.username')}" th:errors="${credentials.username}" style="color:red"></span>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" th:field="${credentials.password}" required />
                <span th:if="${#fields.hasErrors('credentials.password')}" th:errors="${credentials.password}" style="color:red"></span>
            </div>
            <button type="submit">Registrati</button>
        </form>
    </div>

    <footer th:replace="fragments/base.html :: fondo"></footer>
</body>
</html>
